<!-- vfx.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VFX Showcase | Deep Pathak</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>

    :root{
      --bg:#1a1a1a;
      --fg:#ffffff;
      --card:#262626;
      --border:#3d3d3d;
      --accent:#00aaff;
      --muted:#aaaaaa;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:Inter,sans-serif;
    }

    header{
      padding:1.2rem 5%;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid var(--border);
    }

    .logo{
      color:white;
      text-decoration:none;
      font-size:1.4rem;
      font-weight:700;
    }

    .back-btn{
      color:var(--accent);
      text-decoration:none;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
      padding:5rem 0;
      text-align:center;
    }

    h1{
      font-size:3rem;
      margin-bottom:1rem;
    }

    p{
      color:var(--muted);
      margin-bottom:3rem;
    }

    .video-card{
      background:var(--card);
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--border);
    }

    .video-wrapper{
      position:relative;
      padding-top:56.25%;
    }

    iframe{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
    }

    .video-info{
      padding:1.5rem;
    }

    .video-info h3{
      color:var(--accent);
    }

  </style>
</head>

<body>

<header>

  <a href="index.html" class="logo">Deep Pathak</a>

  <a href="index.html" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back
  </a>

</header>

<div class="container">

  <h1>VFX Showcase</h1>

  <p>
    Cinematic visual effects, compositing,
    and advanced post-production projects.
  </p>

  <div class="video-card">

    <div class="video-wrapper">
      <iframe
      src="https://drive.google.com/file/d/1snVRuhS9XGU0_aqNbr-wdr-C27f4Rmsx/preview">
      </iframe>
    </div>

    <div class="video-info">
      <h3>Visual Effects Reel</h3>
    </div>

  </div>

</div>

</body>
</html>
